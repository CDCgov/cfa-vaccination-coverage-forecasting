run_id: full

season:
  start_month: 7 # July
  start_day: 1
  end_month: 4 # April
  end_day: 1
  # use all data
  start_year: 2009
  end_year: 2022

# include all geographies
geographies:

models:
  - name: LPLModel
    params:
      seed: 42
      muA_shape1: 100.0
      muA_shape2: 180.0
      sigmaA_rate: 80.0
      tau_shape1: 100.0
      tau_shape2: 225.0
      K_shape: 150.0
      K_rate: 6.0
      muM_shape: 2.0
      muM_rate: 25.0
      sigmaM_rate: 80.0
      D_shape: 1000
      D_rate: 3.0
      num_warmup: 500
      num_samples: 500
      num_chains: 4
      progress_bar: false
  - name: RFModel
    params:
      n_estimators: 100

forecast_dates:
  start: 2021-07-01
  end: 2022-03-01
  interval: 1mo

alpha: 0.05

plots:
  example_season: "2020/2021"
